log_format readable
  '$time_local | $status | $request_method $uri | ${body_bytes_sent}b | $remote_addr | "$http_referer"';

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  access_log /dev/stdout readable;

  # SSE endpoint — must appear before /api/ so nginx's longest-prefix match
  # picks up the SSE-specific directives instead of the general proxy block.
  location /api/jobs/stream {
    proxy_pass         http://veloci-api:8080/jobs/stream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Disable buffering so each SSE chunk is forwarded immediately.
    proxy_buffering    off;
    proxy_cache        off;
    # SSE connections are long-lived; extend the upstream read timeout well
    # past nginx's default 60 s so the stream isn't silently cut.
    proxy_read_timeout 3600s;
  }

  # Proxy all other API calls to veloci-api; strip /api prefix before forwarding.
  location /api/ {
    proxy_pass         http://veloci-api:8080/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # SPA fallback — all other paths serve index.html.
  location / { try_files $uri $uri/ /index.html; }
}
