services:
  postgres:
    image: postgres:18-alpine
    entrypoint: ["sh", "/postgres-entrypoint.sh"]
    command: ["postgres"]
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./config/veloci.toml:/etc/veloci/veloci.toml:ro
      - ./scripts/postgres-entrypoint.sh:/postgres-entrypoint.sh:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./migrations:/migrations
    networks:
      - veloci
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  rabbitmq:
    # management variant adds the HTTP API on :15672 — same AMQP behaviour.
    # Used by `just enqueue-import` and `just queue-check`.
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: veloci
      RABBITMQ_DEFAULT_PASS: changeme
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - veloci
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  auth:
    build: ./services/auth
    environment:
      VELOCI_CONFIG_PATH: /etc/veloci/veloci.toml
    volumes:
      - ./config/veloci.toml:/etc/veloci/veloci.toml:ro
    networks:
      - veloci

  web:
    build: ./services/web
    environment:
      VELOCI_CONFIG_PATH: /etc/veloci/veloci.toml
    volumes:
      - ./config/veloci.toml:/etc/veloci/veloci.toml:ro
    networks:
      - veloci
    ports:
      - "8080:8080"

  engine:
    build: ./services/engine
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      VELOCI_CONFIG_PATH: /etc/veloci/veloci.toml
    volumes:
      - ./config/veloci.toml:/etc/veloci/veloci.toml:ro
    networks:
      - veloci
    healthcheck:
      test: ["CMD", "/veloci-engine", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  veloci:
