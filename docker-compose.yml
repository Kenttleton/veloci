services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      VELOCI_AUTH_DB: ${VELOCI_AUTH_DB}
      VELOCI_AUTH_DB_USER: ${VELOCI_AUTH_DB_USER}
      VELOCI_AUTH_DB_PASSWORD: ${VELOCI_AUTH_DB_PASSWORD}
      VELOCI_APP_DB: ${VELOCI_APP_DB}
      VELOCI_APP_DB_USER: ${VELOCI_APP_DB_USER}
      VELOCI_APP_DB_PASSWORD: ${VELOCI_APP_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./migrations:/migrations
    ports:
      - "5432:5432"
    networks:
      - veloci
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  rabbitmq:
    # management variant adds the HTTP API on :15672 — same AMQP behaviour.
    # Used by `just enqueue-import` and `just queue-check`.
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - veloci
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  veloci-auth:
    build: ./services/auth
    environment:
      VELOCI_CONFIG_PATH: /etc/veloci/veloci.toml
      VELOCI_DATABASE_HOST: postgres
      VELOCI_DATABASE_AUTH_NAME: ${VELOCI_AUTH_DB}
      VELOCI_DATABASE_AUTH_USER: ${VELOCI_AUTH_DB_USER}
      VELOCI_DATABASE_AUTH_PASSWORD: ${VELOCI_AUTH_DB_PASSWORD}
    volumes:
      - ./config/veloci.toml:/etc/veloci/veloci.toml:ro
    networks:
      - veloci

  veloci-api:
    build: ./services/api
    environment:
      VELOCI_CONFIG_PATH: /etc/veloci/veloci.toml
      VELOCI_DATABASE_HOST: postgres
      VELOCI_DATABASE_APP_NAME: ${VELOCI_APP_DB}
      VELOCI_DATABASE_APP_USER: ${VELOCI_APP_DB_USER}
      VELOCI_DATABASE_APP_PASSWORD: ${VELOCI_APP_DB_PASSWORD}
      VELOCI_RABBITMQ_HOST: rabbitmq
      VELOCI_RABBITMQ_USER: ${RABBITMQ_USER}
      VELOCI_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      VELOCI_API_AUTH_HOST: veloci-auth
    volumes:
      - ./config/veloci.toml:/etc/veloci/veloci.toml:ro
    networks:
      - veloci
    ports:
      - "8080:8080"

  veloci-engine:
    build: ./services/engine
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      VELOCI_CONFIG_PATH: /etc/veloci/veloci.toml
      VELOCI_DATABASE_HOST: postgres
      VELOCI_DATABASE_APP_NAME: ${VELOCI_APP_DB}
      VELOCI_DATABASE_APP_USER: ${VELOCI_APP_DB_USER}
      VELOCI_DATABASE_APP_PASSWORD: ${VELOCI_APP_DB_PASSWORD}
      VELOCI_RABBITMQ_HOST: rabbitmq
      VELOCI_RABBITMQ_USER: ${RABBITMQ_USER}
      VELOCI_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - ./config/veloci.toml:/etc/veloci/veloci.toml:ro
    networks:
      - veloci
    healthcheck:
      test: ["CMD", "/veloci-engine", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  veloci-web:
    build: ./services/web
    networks:
      - veloci
    ports:
      - "3000:80"

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  veloci:
