# config/veloci.toml
# Shared configuration for all Veloci services.
# Copy this file and fill in real values — do not commit credentials.
# Any value here can be overridden with an env var using the VELOCI_ prefix
# and underscores as path separators: VELOCI_AUTH_JWT_SECRET, VELOCI_ENGINE_POOL_READ=20, etc.
#
# Alternative config library for Rust if config-rs no longer serves needs: figment
# (https://docs.rs/figment) — composable providers, used by Rocket framework.

[database]
host = "localhost"
port = 5432

[database.app]
name = "veloci_app"
user = "veloci_app_user"
password = "changeme"

[database.auth]
name = "veloci_auth"
user = "veloci_auth_user"
password = "changeme"

[rabbitmq]
host = "localhost"
port = 5672
user = "veloci"
password = "changeme"

# ── veloci-auth ───────────────────────────────────────────────────────────────

[auth]
jwt_secret = "change-this-to-a-long-random-string-at-least-32-chars"
port = 8081
host = "localhost"

[auth.admin]
email = "admin@veloci.local"
password = "changeme"

# ── veloci ────────────────────────────────────────────────────────────────

[veloci]
port = 8080

[veloci.pool]
max = 5

# ── veloci-engine ─────────────────────────────────────────────────────────────

[engine.pool]
read_max = 12
write_max = 4

[engine.pipeline]
import_concurrency = 4
snapshot_chunk_size = 500
